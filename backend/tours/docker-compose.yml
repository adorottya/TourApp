version: '3.9'

services:
  mongo:
    image: mongo:8
    environment:
      MONGO_INITDB_DATABASE: tours
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  tours-service:
    build: .
    ports:
      - "8082:8082"
      - "9092:9092"
    environment:
      MONGO_URI: mongodb://mongo:27017/tours
      GRPC_PORT: 9092
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo-data:
