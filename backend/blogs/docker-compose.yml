version: '3.9'

services:
  mongo:
    image: mongo:8
    environment:
      MONGO_INITDB_DATABASE: blog
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  blogs-service:
    build: .
    ports:
      - "8083:8083"
    environment:
      MONGO_URL: mongodb://mongo:27017
      MONGO_DB: blog
      FOLLOWER_SERVICE_URL: http://follower:8084
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo-data:
