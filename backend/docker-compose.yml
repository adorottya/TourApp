services:
  postgres-stakeholders:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: stakeholders
      POSTGRES_PASSWORD: stakeholders
      POSTGRES_DB: stakeholders
    volumes:
      - postgres-stakeholders-data:/var/lib/postgresql/data
    networks:
      - backend-net

  mongo-tours:
    image: mongo:8
    environment:
      MONGO_INITDB_DATABASE: tours
    volumes:
      - mongo-tours-data:/data/db
    networks:
      - backend-net

  mongo-blogs:
    image: mongo:8
    environment:
      MONGO_INITDB_DATABASE: blog
    volumes:
      - mongo-blogs-data:/data/db
    networks:
      - backend-net

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/password
    volumes:
      - neo4j-data:/data
    networks:
      - backend-net

  stakeholders:
    build: ./stakeholders
    ports:
      - "8081:8081"
    environment:
      POSTGRES_DSN: host=postgres-stakeholders port=5432 user=stakeholders password=stakeholders dbname=stakeholders sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-secret}
    depends_on:
      - postgres-stakeholders
    networks:
      - backend-net

  tours:
    build: ./tours
    ports:
      - "8082:8082"
    environment:
      MONGO_URI: mongodb://mongo-tours:27017/tours
      GRPC_PORT: 9092
    depends_on:
      - mongo-tours
    networks:
      - backend-net

  blogs:
    build: ./blogs
    ports:
      - "8083:8083"
    environment:
      MONGO_URL: mongodb://mongo-blogs:27017
      MONGO_DB: blog
      FOLLOWER_SERVICE_URL: http://follower:8084
    depends_on:
      - mongo-blogs
    networks:
      - backend-net

  follower:
    build: ./follower
    ports:
      - "8084:8084"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
    depends_on:
      - neo4j
    networks:
      - backend-net

volumes:
  postgres-stakeholders-data:
  mongo-tours-data:
  mongo-blogs-data:
  neo4j-data:

networks:
  backend-net:
