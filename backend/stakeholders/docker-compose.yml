version: '3.9'

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: stakeholders
      POSTGRES_PASSWORD: stakeholders
      POSTGRES_DB: stakeholders
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stakeholders"]
      interval: 10s
      timeout: 5s
      retries: 5

  stakeholders-service:
    build: .
    ports:
      - "8081:8081"
      - "9091:9091"
    environment:
      POSTGRES_DSN: host=postgres port=5432 user=stakeholders password=stakeholders dbname=stakeholders sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-secret}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
