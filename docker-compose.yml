version: '3.9'

services:
  # ============ Stakeholders Service ============
  postgres-stakeholders:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: stakeholders
      POSTGRES_PASSWORD: stakeholders
      POSTGRES_DB: stakeholders
    volumes:
      - postgres-stakeholders-data:/var/lib/postgresql/data
    networks:
      - tourapp-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stakeholders"]
      interval: 10s
      timeout: 5s
      retries: 5

  stakeholders:
    build: ./backend/stakeholders
    ports:
      - "8081:8081"
      - "9091:9091"
    environment:
      POSTGRES_DSN: host=postgres-stakeholders port=5432 user=stakeholders password=stakeholders dbname=stakeholders sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-secret}
    depends_on:
      postgres-stakeholders:
        condition: service_healthy
    networks:
      - tourapp-net

  # ============ Tours Service ============
  mongo-tours:
    image: mongo:8
    environment:
      MONGO_INITDB_DATABASE: tours
    volumes:
      - mongo-tours-data:/data/db
    networks:
      - tourapp-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  tours:
    build: ./backend/tours
    ports:
      - "8082:8082"
      - "9092:9092"
    environment:
      MONGO_URI: mongodb://mongo-tours:27017/tours
      GRPC_PORT: 9092
    depends_on:
      mongo-tours:
        condition: service_healthy
    networks:
      - tourapp-net

  # ============ Blogs Service ============
  mongo-blogs:
    image: mongo:8
    environment:
      MONGO_INITDB_DATABASE: blog
    volumes:
      - mongo-blogs-data:/data/db
    networks:
      - tourapp-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  blogs:
    build: ./backend/blogs
    ports:
      - "8083:8083"
    environment:
      MONGO_URL: mongodb://mongo-blogs:27017
      MONGO_DB: blog
      FOLLOWER_SERVICE_URL: http://follower:8084
      TOURS_SERVICE_URL: http://tours:8082
    depends_on:
      mongo-blogs:
        condition: service_healthy
    networks:
      - tourapp-net

  # ============ Follower Service ============
  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/password
    volumes:
      - neo4j-data:/data
    networks:
      - tourapp-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 5

  follower:
    build: ./backend/follower
    ports:
      - "8084:8084"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - tourapp-net

  # ============ Gateway ============
  gateway:
    build: ./gateway
    ports:
      - "8080:8080"
    environment:
      STAKEHOLDERS_GRPC_ADDR: stakeholders:9091
      STAKEHOLDERS_URL: http://stakeholders:8081
      TOURS_GRPC_ADDR: tours:9092
      TOURS_URL: http://tours:8082
      BLOGS_URL: http://blogs:8083
      FOLLOWER_URL: http://follower:8084
      JWT_SECRET: ${JWT_SECRET:-secret}
    depends_on:
      - stakeholders
      - tours
      - blogs
      - follower
    networks:
      - tourapp-net

volumes:
  postgres-stakeholders-data:
  mongo-tours-data:
  mongo-blogs-data:
  neo4j-data:

networks:
  tourapp-net:
    driver: bridge
